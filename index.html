<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta property="og:image"
        content="https://github.com/N30Yang/ascii-fluid/blob/94a1650c84198689d5217b1f5e35c611087b4614" />
    <meta property="og:url" content="https://github.com/N30Yang/ascii-fluid" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Liquid Ascii</title>
    <link rel="stylesheet" href="style.css" />
    <!-- uses sf mono but if not avalible uses Liberation mono, apple please dont sue me <3 -->
</head>

<body>
    <canvas id="canvas"></canvas>
    <div class="render"></div>

    <div class="info -left">
        <a href="https://github.com/N30Yang/ascii-fluid">
            <div class="info-label">want to see the code?</div>
        </a>
    </div>

    <div class="info -right">
        <a href="https://horizons.hackclub.com">
            <div class="info-label">For Hack Club Horizons 2026</div>
            <!-- for any avid review er watching this, :)-->
        </a>
    </div>
    <!-- hotkeys and controls-->
     <div class="buttons">
        <button class="btn" id="btn_pause">pause [p]</button>
        <button class="btn" id="btn_shake">shake[s]</button>
        <button class="btn" id="btn_rain">rain [r]</button>
        <button class="btn" id="btn_oil">oil [oil]</button>
        <button class="btn" id="btn_shape">shape: hexagon [c]</button>
        <button class="btn" id="btn_gravity">puck: pinned [g]</button>
     </div>

     <div class="controls">
        <label class="info-label" for="size_slider">size</label>
        <input id="size_slider" type="range" min="10" max="200" value="100" step="1"/>
        <span class="info-label" id="size_val">100</span>
     </div>

     <!--error checking-->
     <pre id="errbox"></pre>
     <script>
        window.addEventListener("error", function (e) {
            var box = document.getElementById("errbox");
            if (box) {
                box.style.display = "block";
                box.textContent = "JS ERROR: " + (e.message || e.error) +
                    "\n" + (e.filename || "") +":"+(e.lineno||"");
            }
        });
    </script>
    <script src="script.js"></script>
</body>    

</html>
