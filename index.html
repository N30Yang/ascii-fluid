<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta property="og:image"
        content="https://github.com/N30Yang/ascii-fluid/blob/94a1650c84198689d5217b1f5e35c611087b4614" />
    <meta property="og:url" content="https://github.com/N30Yang/ascii-fluid" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Liquid Ascii</title>
    <link rel="stylesheet" href="style.css" />
    <!-- uses sf mono but if not avalible uses Liberation mono, apple please dont sue me <3 -->
</head>

<body>
    <canvas id="canvas"></canvas>
    <div class="render"></div>

    <div class="info -left">
        <a href="https://github.com/N30Yang/ascii-fluid">
            <div class="info-label">want to see the code?</div>
        </a>
    </div>

    <div class="info -right">
        <a href="https://horizons.hackclub.com">
            <div class="info-label">For Hack Club Horizons 2026</div>
            <!-- for any avid review er watching this, :)-->
        </a>
    </div>

    <!-- hotkeys legend, bottom left -->
    <div class="hotkeys">
        <div class="info-label">drag &mdash; move hexagon</div>
        <div class="info-label">[ p ] &mdash; pause</div>
        <div class="info-label">[ s ] &mdash; shake / explode</div>
    </div>

    <div class="controls">
        <label class="info-label" for="size_slider">hex size</label>
        <input id="size_slider" type="range" min="10" max="200" value="100" step="1" />
        <span class="info-label" id="size_val">100</span>
    </div>

    <!-- if the script crashes, the error shows here instead of a blank screen -->
    <pre id="errbox"></pre>

    <script>
        // surface any script error on-screen so it's not just a dead page
        window.addEventListener("error", function (e) {
            var box = document.getElementById("errbox");
            if (box) {
                box.style.display = "block";
                box.textContent = "JS ERROR: " + (e.message || e.error) +
                    "\n" + (e.filename || "") + ":" + (e.lineno || "");
            }
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
